services:
  mysql:
    image: mysql:8.0
    container_name: focusflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ZXY@1290
      MYSQL_DATABASE: focusflow
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: focusflow-api
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    ports:
      - "3001:3001"
    depends_on:
      - mysql

volumes:
  mysql_data:
